function renderSourceGrid() {

function getFallbackLogoSvg(appId) {

function scheduleLogoLoad(callback) {

function performSearch() {

function buildLinks(app, q) {

let mode = "网页搜索";
if (currentEnv.desktop) {
mode = "桌面端：网页搜索";
} else if (currentEnv.inApp) {

function saveHistoryEntry(q, app) {

function normalizeHistory(value) {

const key = `${item.appId}\u0000${q}`;

function syncMenuState() {
